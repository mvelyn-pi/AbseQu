<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom radio input styling for role selection */
        .role-radio:checked + label {
            background-color: #F1F8E9; /* Very light green tint for selection */
            border-color: #1B5E20;     /* Deep green border */
            color: #1B5E20;
        }
    </style>

<body class="bg-[#F1F8E9] min-h-screen flex items-center justify-center p-md">
<!-- Centered Login Card -->
<main class="w-full max-w-md bg-surface-container-lowest border border-[#E0E0E0] rounded-lg p-xl flex flex-col gap-xl">
<!-- Header / Logo Area -->
<header class="flex flex-col items-center gap-xs text-center">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="school">school</span>
<h1 class="font-headline-lg text-headline-lg text-primary">AbsenQu</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sistem Kehadiran Digital</p>
</header>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<!-- Role Selection (Segment Control Style) -->
<fieldset class="flex flex-col gap-xs">
<legend class="font-label-bold text-label-bold text-on-surface">Pilih Peran</legend>
<div class="grid grid-cols-3 gap-base">
<div>
<input checked="" class="hidden role-radio" id="role-admin" name="role" type="radio"/>
<label class="flex justify-center items-center h-10 border border-[#E0E0E0] rounded cursor-pointer font-body-sm text-body-sm text-on-surface-variant transition-colors hover:border-[#1B5E20]" for="role-admin">
                            Admin
                        </label>
</div>
<div>
<input class="hidden role-radio" id="role-guru" name="role" type="radio"/>
<label class="flex justify-center items-center h-10 border border-[#E0E0E0] rounded cursor-pointer font-body-sm text-body-sm text-on-surface-variant transition-colors hover:border-[#1B5E20]" for="role-guru">
                            Guru
                        </label>
</div>
<div>
<input class="hidden role-radio" id="role-ortu" name="role" type="radio"/>
<label class="flex justify-center items-center h-10 border border-[#E0E0E0] rounded cursor-pointer font-body-sm text-body-sm text-on-surface-variant transition-colors hover:border-[#1B5E20]" for="role-ortu">
                            Orang Tua
                        </label>
</div>
</div>
</fieldset>
<!-- Input Fields -->
<div class="flex flex-col gap-md">
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-on-surface" for="email">Email</label>
<input class="w-full h-12 px-sm border border-[#D1D1D1] rounded font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary-container focus:ring-0 transition-colors" id="email" name="email" placeholder="nama@sekolah.edu" required="" type="email"/>
</div>
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<a class="font-label-bold text-label-bold text-primary-container hover:underline" href="#">Lupa password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-sm border border-[#D1D1D1] rounded font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary-container focus:ring-0 transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary-container text-on-primary font-button-text text-button-text rounded flex items-center justify-center gap-xs hover:bg-[#154a19] active:border-2 active:border-primary-container transition-all" type="submit">
                Login
                <span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
</button>
</form>
<!-- Footer link -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Belum punya akun? <a class="font-button-text text-button-text text-primary-container hover:underline" href="#">Hubungi Admin</a>
</p>
</div>
</main>
<script>
        // Simple password toggle visibility script
        const passwordInput = document.getElementById('password');
        const toggleBtn = passwordInput.nextElementSibling;
        const toggleIcon = toggleBtn.querySelector('span');

        toggleBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
                toggleIcon.setAttribute('data-icon', 'visibility_off');
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
                toggleIcon.setAttribute('data-icon', 'visibility');
            }
        });
    </script>
